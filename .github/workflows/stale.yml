name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. If it's still relevant,
            please leave a comment. Otherwise it will be closed in 14 days.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen with updated context.
          stale-pr-message: >
            This PR has been inactive for 30 days. Please rebase or update it.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when ready.
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: 'status:stale'
          stale-pr-label: 'status:stale'
          exempt-issue-labels: 'status:approved,status:in-progress,priority:high,priority:critical'
          exempt-pr-labels: 'status:in-progress'
          close-issue-label: 'status:wontfix'
