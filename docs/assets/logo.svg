<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="400" height="80" rx="8" fill="none"/>

  <!-- Brain/network icon -->
  <circle cx="40" cy="40" r="22" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <circle cx="40" cy="40" r="8" fill="#4A90D9" opacity="0.3"/>
  <circle cx="40" cy="40" r="3" fill="#4A90D9"/>

  <!-- Neural nodes -->
  <circle cx="28" cy="24" r="3" fill="#7aa2f7"/>
  <circle cx="52" cy="24" r="3" fill="#9ece6a"/>
  <circle cx="56" cy="42" r="3" fill="#e0af68"/>
  <circle cx="48" cy="58" r="3" fill="#f7768e"/>
  <circle cx="28" cy="56" r="3" fill="#bb9af7"/>
  <circle cx="22" cy="40" r="3" fill="#7dcfff"/>

  <!-- Connections -->
  <line x1="40" y1="40" x2="28" y2="24" stroke="#7aa2f7" stroke-width="1.2" opacity="0.6"/>
  <line x1="40" y1="40" x2="52" y2="24" stroke="#9ece6a" stroke-width="1.2" opacity="0.6"/>
  <line x1="40" y1="40" x2="56" y2="42" stroke="#e0af68" stroke-width="1.2" opacity="0.6"/>
  <line x1="40" y1="40" x2="48" y2="58" stroke="#f7768e" stroke-width="1.2" opacity="0.6"/>
  <line x1="40" y1="40" x2="28" y2="56" stroke="#bb9af7" stroke-width="1.2" opacity="0.6"/>
  <line x1="40" y1="40" x2="22" y2="40" stroke="#7dcfff" stroke-width="1.2" opacity="0.6"/>

  <!-- Outer ring nodes -->
  <circle cx="28" cy="24" r="2" fill="#7aa2f7"/>
  <circle cx="52" cy="24" r="2" fill="#9ece6a"/>
  <circle cx="56" cy="42" r="2" fill="#e0af68"/>
  <circle cx="48" cy="58" r="2" fill="#f7768e"/>
  <circle cx="28" cy="56" r="2" fill="#bb9af7"/>
  <circle cx="22" cy="40" r="2" fill="#7dcfff"/>

  <!-- Text -->
  <text x="76" y="36" fill="#c0caf5" font-size="28" font-weight="700" letter-spacing="-0.5">cortex</text>
  <text x="198" y="36" fill="#4A90D9" font-size="28" font-weight="300">-ia</text>
  <text x="76" y="56" fill="#565f89" font-size="12" letter-spacing="0.5">AI Agent Ecosystem Configurator</text>
</svg>
