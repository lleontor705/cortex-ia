    <rect x="460" y="216" width="360" height="32" rx="6" fill="#1e2030" stroke="#bb9af7" stroke-width="1"/>
    <text x="640" y="237" text-anchor="middle" fill="#bb9af7" font-size="10">full pipeline (all 9 phases)</text>
  </g>
  <!-- Docs -->
  <g filter="url(#shadowR)">
    <rect x="460" y="256" width="360" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1"/>
    <text x="640" y="277" text-anchor="middle" fill="#c0caf5" font-size="10">/implement (direct)</text>
  </g>
  <!-- Infra -->
  <g filter="url(#shadowR)">
    <rect x="460" y="296" width="360" height="32" rx="6" fill="#1e2030" stroke="#7dcfff" stroke-width="1"/>
    <text x="640" y="317" text-anchor="middle" fill="#c0caf5" font-size="10">/fast-forward &#8594; /implement</text>
  </g>
  <!-- Debate -->
  <g filter="url(#shadowR)">
    <rect x="460" y="336" width="360" height="32" rx="6" fill="#1e2030" stroke="#ff9e64" stroke-width="1"/>
    <text x="640" y="357" text-anchor="middle" fill="#c0caf5" font-size="10">adversarial @investigate agents &#8594; synthesis</text>
  </g>
  <!-- Git ops -->
  <g filter="url(#shadowR)">
    <rect x="460" y="376" width="360" height="32" rx="6" fill="#1e2030" stroke="#565f89" stroke-width="1"/>
    <text x="640" y="397" text-anchor="middle" fill="#c0caf5" font-size="10">direct skill execution (no SDD pipeline)</text>
  </g>

  <!-- Arrows: command → pipeline -->
  <line x1="420" y1="112" x2="458" y2="112" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="152" x2="458" y2="152" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="192" x2="458" y2="192" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="232" x2="458" y2="232" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="272" x2="458" y2="272" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="312" x2="458" y2="312" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="352" x2="458" y2="352" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="420" y1="392" x2="458" y2="392" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>

  <!-- Legend -->
  <g transform="translate(280,435)">
    <rect x="0" y="0" width="340" height="32" rx="6" fill="#1e2030" opacity="0.6"/>
    <circle cx="20" cy="16" r="5" fill="#9ece6a"/>
    <text x="32" y="20" fill="#565f89" font-size="9">SDD pipeline</text>
    <circle cx="120" cy="16" r="5" fill="#bb9af7"/>
    <text x="132" y="20" fill="#565f89" font-size="9">Full pipeline</text>
    <circle cx="210" cy="16" r="5" fill="#ff9e64"/>
    <text x="222" y="20" fill="#565f89" font-size="9">Adversarial</text>
    <circle cx="290" cy="16" r="5" fill="#565f89"/>
    <text x="302" y="20" fill="#565f89" font-size="9">Direct</text>
  </g>
</svg>
