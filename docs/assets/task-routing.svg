    <text x="340" y="204" text-anchor="middle" fill="#565f89" font-size="8">TASK-TYPE: REFACTOR</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="260" y="216" width="160" height="32" rx="6" fill="#1e2030" stroke="#bb9af7" stroke-width="1.2"/>
    <text x="340" y="233" text-anchor="middle" fill="#bb9af7" font-size="10" font-weight="500">/new-change</text>
    <text x="340" y="244" text-anchor="middle" fill="#565f89" font-size="8">FOCUS: MIGRATION</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="260" y="256" width="160" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1.2"/>
    <text x="340" y="273" text-anchor="middle" fill="#9ece6a" font-size="10" font-weight="500">/new-change</text>
    <text x="340" y="284" text-anchor="middle" fill="#565f89" font-size="8">TASK-TYPE: DOCS</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="260" y="296" width="160" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1.2"/>
    <text x="340" y="313" text-anchor="middle" fill="#9ece6a" font-size="10" font-weight="500">/new-change</text>
    <text x="340" y="324" text-anchor="middle" fill="#565f89" font-size="8">TASK-TYPE: INFRA</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="260" y="336" width="160" height="32" rx="6" fill="#1e2030" stroke="#ff9e64" stroke-width="1.2"/>
    <text x="340" y="357" text-anchor="middle" fill="#ff9e64" font-size="11" font-weight="500">/debate</text>
  </g>
