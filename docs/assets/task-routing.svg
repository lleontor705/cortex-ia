  <line x1="200" y1="152" x2="258" y2="152" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="192" x2="258" y2="192" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="232" x2="258" y2="232" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="272" x2="258" y2="272" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="312" x2="258" y2="312" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="352" x2="258" y2="352" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="200" y1="392" x2="258" y2="392" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#arrowR)" opacity="0.5"/>

  <!-- === PIPELINE column === -->
  <text x="640" y="82" text-anchor="middle" fill="#e0af68" font-size="11" font-weight="600" letter-spacing="1">PIPELINE</text>

  <!-- Standard pipeline -->
  <g filter="url(#shadowR)">
    <rect x="460" y="96" width="360" height="32" rx="6" fill="#1e2030" stroke="#7aa2f7" stroke-width="1"/>
    <text x="640" y="117" text-anchor="middle" fill="#c0caf5" font-size="10">/fast-forward &#8594; /implement &#8594; /validate</text>
  </g>
  <!-- Bug fix pipeline -->
  <g filter="url(#shadowR)">
    <rect x="460" y="136" width="360" height="32" rx="6" fill="#1e2030" stroke="#f7768e" stroke-width="1"/>
    <text x="640" y="157" text-anchor="middle" fill="#c0caf5" font-size="10">/fast-forward &#8594; /implement &#8594; /validate</text>
  </g>
  <!-- Refactor pipeline -->
  <g filter="url(#shadowR)">
    <rect x="460" y="176" width="360" height="32" rx="6" fill="#1e2030" stroke="#e0af68" stroke-width="1"/>
    <text x="640" y="197" text-anchor="middle" fill="#c0caf5" font-size="10">/fast-forward &#8594; /implement &#8594; /validate</text>
  </g>
  <!-- Migration (full) -->
