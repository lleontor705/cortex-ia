    <rect x="260" y="96" width="160" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1.2"/>
    <text x="340" y="117" text-anchor="middle" fill="#9ece6a" font-size="11" font-weight="500">/new-change</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="260" y="136" width="160" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1.2"/>
