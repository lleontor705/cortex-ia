<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <filter id="shadowR">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="12" fill="url(#bgR)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#c0caf5" font-size="18" font-weight="700">Task Routing</text>
  <text x="450" y="54" text-anchor="middle" fill="#565f89" font-size="11">How user requests map to SDD workflows</text>

  <!-- === USER REQUEST column === -->
  <text x="115" y="82" text-anchor="middle" fill="#7aa2f7" font-size="11" font-weight="600" letter-spacing="1">USER REQUEST</text>

  <g filter="url(#shadowR)">
    <rect x="30" y="96" width="170" height="32" rx="6" fill="#1e2030" stroke="#7aa2f7" stroke-width="1.2"/>
    <text x="115" y="117" text-anchor="middle" fill="#c0caf5" font-size="11">New feature</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="136" width="170" height="32" rx="6" fill="#1e2030" stroke="#f7768e" stroke-width="1.2"/>
    <text x="115" y="157" text-anchor="middle" fill="#c0caf5" font-size="11">Bug fix</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="176" width="170" height="32" rx="6" fill="#1e2030" stroke="#e0af68" stroke-width="1.2"/>
    <text x="115" y="197" text-anchor="middle" fill="#c0caf5" font-size="11">Refactoring</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="216" width="170" height="32" rx="6" fill="#1e2030" stroke="#bb9af7" stroke-width="1.2"/>
    <text x="115" y="237" text-anchor="middle" fill="#c0caf5" font-size="11">Migration</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="256" width="170" height="32" rx="6" fill="#1e2030" stroke="#9ece6a" stroke-width="1.2"/>
    <text x="115" y="277" text-anchor="middle" fill="#c0caf5" font-size="11">Documentation</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="296" width="170" height="32" rx="6" fill="#1e2030" stroke="#7dcfff" stroke-width="1.2"/>
    <text x="115" y="317" text-anchor="middle" fill="#c0caf5" font-size="11">Infrastructure</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="336" width="170" height="32" rx="6" fill="#1e2030" stroke="#ff9e64" stroke-width="1.2"/>
    <text x="115" y="357" text-anchor="middle" fill="#c0caf5" font-size="11">Architecture decision</text>
  </g>
  <g filter="url(#shadowR)">
    <rect x="30" y="376" width="170" height="32" rx="6" fill="#1e2030" stroke="#565f89" stroke-width="1.2"/>
    <text x="115" y="397" text-anchor="middle" fill="#c0caf5" font-size="11">Git operations</text>
  </g>

  <!-- === COMMAND column === -->
  <text x="340" y="82" text-anchor="middle" fill="#9ece6a" font-size="11" font-weight="600" letter-spacing="1">COMMAND</text>

