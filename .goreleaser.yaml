version: 2

project_name: cortex-ia

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/cortex-ia
    binary: cortex-ia
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^refactor"
      - "^perf"
    exclude:
      - "^docs"
      - "^test"
      - "^ci"
      - "^chore\\(deps\\)"

brews:
  - name: cortex-ia
    repository:
      owner: lleontor705
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/lleontor705/cortex-ia"
    description: "AI Agent Ecosystem Configurator — persistent memory, SDD workflow, inter-agent messaging, multi-CLI orchestration"
    license: "MIT"
    commit_msg_template: "chore: update cortex-ia formula to {{ .Tag }}"

scoops:
  - repository:
      owner: lleontor705
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: cortex-ia
    homepage: "https://github.com/lleontor705/cortex-ia"
    description: "AI Agent Ecosystem Configurator — persistent memory, SDD workflow, inter-agent messaging, multi-CLI orchestration"
    license: MIT
    commit_msg_template: "chore: update cortex-ia to {{ .Tag }}"
